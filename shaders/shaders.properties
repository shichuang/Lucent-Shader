# AetherLight Shaders Properties
# Compatible with Iris Shaders & OptiFine

# --- 程序链接 (Program Links) ---
program.gbuffers_terrain=program/gbuffers_terrain
program.gbuffers_water=program/gbuffers_water
program.shadow=program/shadow
program.deferred=program/deferred
program.composite=program/composite
program.composite1=program/composite1
program.final=program/final

# --- 多渲染目标 (MRT) 配置 ---
# gbuffer.color0: Albedo (RGB) + Specular Strength (A)
# gbuffer.color1: Normal (RGB) + MaterialID (A)
# gbuffer.color2: Lightmap (RG) + Emission (B) + Unused (A)

# --- 特性开关 (Feature Flags) ---
sliders=shadowQuality, renderDistanceScale
bools=enableSSAO, enableBloom, enableWaterRefraction

# 默认值
shadowQuality=1.0
renderDistanceScale=1.0
enableSSAO=true
enableBloom=true
enableWaterRefraction=true

# --- 变量别名 (Uniform Aliases) ---
alias.texture.gcolor=color0
alias.texture.gdepth=depth
alias.texture.gnormal=color1
alias.texture.glightmap=color2

# --- 轮廓与天空 (Profile & Sky) ---
sun=false
moon=false
star=false
underwaterOverlay=false
rain=false

# --- 阴影多边形偏移 (防止 Shadow Acne) ---
shadowPolygonOffset=-2.0
shadowPolygonFactor=-1.0
